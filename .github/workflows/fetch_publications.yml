name: Fetch Publications from OpenAlex

on:
  # Schedule disabled until you set OPENALEX_AUTHOR_ID in scripts/fetch_publications.py.
  # Note: running this workflow OVERWRITES _bibliography/papers.bib.
  # Re-enable by uncommenting the lines below.
  # schedule:
  #   - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  fetch-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Fetch publications from OpenAlex
        run: python scripts/fetch_publications.py
      - name: Commit and push updated papers.bib
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _bibliography/papers.bib
          git diff --staged --quiet || git commit -m "chore: auto-update publications [skip ci]"
          git push
