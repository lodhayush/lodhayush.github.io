# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Ayush Lodh
first_name: Ayush
middle_name:
last_name: Lodh
email: ayushlodh26@gmail.com
description: >
  Master's student in Computer Science & Engineering at NIT Delhi.
  Research interests: computer vision, deep learning, handwriting
  recognition, and document understanding.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a>
  with the <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme.

icon: 🎓 # the emoji used as the favicon (alternatively, provide image name in /assets/img/)

url: https://lodhayush.github.io # free GitHub Pages URL (user site; no CNAME)
baseurl: ""
last_updated: true
impressum_path: # set to path to include impressum link in footer

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
og_image: /assets/img/prof_pic.jpg

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: lodhayush
linkedin_username: ayush-lodh
scholar_userid: 4tPZSLkAAAAJ
orcid_id: 0009-0001-7506-0900
dblp_url: # https://dblp.org/pid/xxx/xxxx.html (add when a DBLP profile exists)

contact_note: >
  Feel free to reach out for collaborations or questions about my research.

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------
google_analytics: # your google analytics id (G-XXXXXXXXXX)
bing_verification: # bing verification token

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5

latest_posts:
  enabled: false
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Includes & excludes
include: ["_pages"]
exclude:
  - AGENTS.md
  - ANALYTICS.md
  - bin/
  - CLAUDE.md
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - docker-compose-slim.yml
  - docker-compose.yml
  - Dockerfile
  - FAQ.md
  - INSTALL.md
  - LICENSE
  - package-lock.json
  - package.json
  - PERSONALIZE.md
  - purgecss.config.js
  - QUICKSTART.md
  - readme_preview/
  - README.md
  - renovate.json
  - requirements.txt
  - scripts/
  - SEO.md
  - TROUBLESHOOTING.md

keep_files:
  - .nojekyll
  - .git

# Plug-ins
plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# Sitemap settings
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Jekyll Scholar (publications)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Lodh]
  first_name: [Ayush, A.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

# Display the year only if it is not the current year
display_years:
  start: 2016
  end: 2026

# Badges (shown on publication cards)
enable_publication_badges:
  altmetric: true
  dimensions: true
  inspirehep: false

# Filter out certain bibtex entry types from the Bibliography / Citations page
filtered_bibtex_keywords:
  [abbr, abstract, award, award_name, bibtex_show, blog, code, html, pdf, poster, preview, selected, slides, supp, video, website]

# Maximum number of authors to show before "et al."
max_author_limit: 10
more_authors_animation_delay: 10

# Enables or disables the dark mode toggle
enable_darkmode: true

# Enable medium zoom on images
# enable_medium_zoom: true

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics: false # set to true after adding your google_analytics id above
enable_cronitor_analytics: false
enable_pirsch_analytics: false
enable_openpanel_analytics: false
enable_google_verification: false
enable_bing_verification: false
enable_masonry: true
enable_math: true
enable_tooltips: false
enable_katex: false
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

